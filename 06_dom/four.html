<!DOCTYPE html>
<html lang="en">
<head>
       <meta charset="UTF-8">
       <meta name="viewport" content="width=device-width, initial-scale=1.0">
       <title>Chai aur Code | DOM</title>
</head>
<body style="background-color: #212121; color: #fff;">
       <ul class="language">
              <li>Javascript</li>
       </ul>
</body>
<script>
       function addLanguage(LanguageName) {
            const li = document.createElement("li")
            li.innerHTML = `${LanguageName}`

            document.querySelector('.language').appendChild(li)
       }
       addLanguage("Python")
       addLanguage("Typescript")

       //optimized way
       function addOptiLanguage(langName){
              const li = document.createElement('li')
              // const addText = document.createTextNode(langName)
              // li.appendChild(addText)

              li.appendChild(document.createTextNode(langName))
              document.querySelector('.language').appendChild(li)
       }
       addOptiLanguage("Java")
       addOptiLanguage("Cpp")

       //Edit
     const seocondLang =  document.querySelector('li:nth-child(2)');
//      seocondLang.innerHTML = "MOJO";

     const newLi =  document.createElement('li');
     newLi.textContent = "Mojo"
     seocondLang.replaceWith(newLi)

     //Edit
     const firstLang = document.querySelector('li:first-child');
     firstLang.outerHTML = "<li>Typescript</li>"

     //remove
     const lastLang = document.querySelector("li:last-child")
     lastLang.remove()


</script>
</html>
